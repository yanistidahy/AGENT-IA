[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip setuptools",
  "/app/.venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "/app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
